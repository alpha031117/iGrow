name: Deploy to Alibaba ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-alibaba
  cancel-in-progress: false

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: bun run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIBABA_HOST }}
          username: ${{ secrets.ALIBABA_USER }}
          password: ${{ secrets.ALIBABA_PASSWORD }}
          port: ${{ secrets.ALIBABA_PORT || 22 }}
          script: |
            set -eu
            APP_DIR="${{ secrets.ALIBABA_DEPLOY_PATH || '/var/www/iGrow' }}"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            APP_DIR="$APP_DIR" DEPLOY_BRANCH="main" scripts/deploy.sh
