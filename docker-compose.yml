services:
  mysql:
    image: mysql:8.0
    container_name: igrow_mysql
    environment:
      MYSQL_ROOT_PASSWORD: igrow
      MYSQL_DATABASE: brisval_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pigrow"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
